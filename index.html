<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Duelo Elemental: IA Evolutiva Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; }
        canvas { display: block; background: #1a1a1a; margin: 0 auto; border: 4px solid #333; }
        
        /* Interfaz de Usuario */
        .hud { width: 800px; margin: 10px auto; display: flex; justify-content: space-between; position: relative; z-index: 5; }
        .fighter-info { width: 40%; }
        .bar-container { width: 100%; height: 15px; background: #333; border: 1px solid #555; margin-top: 5px; }
        .health-fill { height: 100%; width: 100%; transition: width 0.3s; }
        #p1-hp { background: #0095ff; box-shadow: 0 0 10px #0095ff; }
        #p2-hp { background: #ff3c00; box-shadow: 0 0 10px #ff3c00; }
        .power-bar { height: 6px; width: 0%; background: gold; margin-top: 4px; transition: width 0.1s; }
        .ready { background: #fff; box-shadow: 0 0 15px gold; }

        /* Pantallas de Menú */
        #overlay { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.7); display: flex; flex-direction: column; 
            justify-content: center; align-items: center; z-index: 10; display: none; 
        }
        .btn { 
            padding: 15px 40px; margin: 10px; font-size: 20px; font-weight: bold; 
            color: white; border: none; cursor: pointer; border-radius: 5px; text-transform: uppercase;
        }
        #btn-main { background: #28a745; }
        #btn-restart { background: #dc3545; display: none; }
        #status-text { font-size: 40px; margin-bottom: 20px; text-align: center; }
        #difficulty-label { position: absolute; bottom: 20px; left: 20px; color: #0f0; font-family: monospace; }
        
        .pause-btn { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 20; padding: 5px 15px; background: #444; border: 1px solid #fff; color: white; cursor: pointer; }
    </style>
</head>
<body>

    <button class="pause-btn" onclick="togglePause()">PAUSA (P)</button>

    <div class="hud">
        <div class="fighter-info">
            HUMANO
            <div class="bar-container"><div id="p1-hp" class="health-fill"></div></div>
            <div class="bar-container" style="height:6px"><div id="p1-power" class="power-bar"></div></div>
        </div>
        <div class="fighter-info" style="text-align: right;">
            IA EVOLUTIVA
            <div class="bar-container"><div id="p2-hp" class="health-fill"></div></div>
            <div class="bar-container" style="height:6px"><div id="p2-power" class="power-bar"></div></div>
        </div>
    </div>

    <div id="overlay">
        <div id="status-text">PAUSA</div>
        <button id="btn-main" class="btn" onclick="togglePause()">REANUDAR</button>
        <button id="btn-restart" class="btn" onclick="resetGame()">REINICIAR COMBATE</button>
    </div>

    <div id="difficulty-label">Nivel de la IA: 1 (Aprendiendo...)</div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    canvas.width = 800; canvas.height = 400;

    // --- MEMORIA DE LA IA (PERSISTENTE ENTRE REINICIOS) ---
    const iaMemory = {
        totalGamesPlayed: 1,
        playerS_shots: 0,
        totalActions: 1,
        difficultyMultiplier: 1.0,
        dodgeReflex: 0.1
    };

    let isPaused = false;
    let isGameOver = false;
    const keys = {};

    class Fighter {
        constructor({ x, color, isPlayer }) {
            this.initialX = x;
            this.isPlayer = isPlayer;
            this.color = color;
            this.reset();
        }

        reset() {
            this.pos = { x: this.initialX, y: 200 };
            this.vel = { x: 0, y: 0 };
            this.w = 50; this.h = 80;
            this.health = 100;
            this.power = 0;
            this.isCrouching = false;
            this.cooldown = false;
        }

        update() {
            if (isPaused || isGameOver) return;
            
            this.pos.x += this.vel.x;
            this.pos.y += this.vel.y;

            if (this.pos.y + this.h >= 380) {
                this.vel.y = 0; this.pos.y = 380 - this.h;
            } else {
                this.vel.y += 0.8;
            }

            // Carga de energía (1 min aprox)
            if (this.power < 100) this.power += 0.03 * (this.isPlayer ? 1 : iaMemory.difficultyMultiplier);
        }

        draw() {
            let h = this.isCrouching ? this.h / 2 : this.h;
            let y = this.isCrouching ? this.pos.y + this.h / 2 : this.pos.y;
            ctx.fillStyle = this.color;
            ctx.fillRect(this.pos.x, y, this.w, h);
            ctx.fillStyle = "white";
            ctx.fillRect(this.isPlayer ? this.pos.x + 35 : this.pos.x + 5, y + 10, 10, 10);
        }
    }

    const player = new Fighter({ x: 100, color: '#0095ff', isPlayer: true });
    const enemy = new Fighter({ x: 650, color: '#ff3c00', isPlayer: false });
    let projectiles = [];

    function togglePause() {
        if (isGameOver) return;
        isPaused = !isPaused;
        document.getElementById('overlay').style.display = isPaused ? 'flex' : 'none';
        document.getElementById('status-text').innerText = "PAUSA";
        document.getElementById('btn-main').style.display = isPaused ? 'block' : 'none';
    }

    function resetGame() {
        iaMemory.totalGamesPlayed++;
        iaMemory.difficultyMultiplier += 0.2; // La IA es 20% más fuerte cada vez
        document.getElementById('difficulty-label').innerText = `Nivel de la IA: ${iaMemory.totalGamesPlayed} (Dificultad x${iaMemory.difficultyMultiplier.toFixed(1)})`;
        
        player.reset();
        enemy.reset();
        projectiles = [];
        isGameOver = false;
        isPaused = false;
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('btn-restart').style.display = 'none';
        animate();
    }

    function createProjectile(owner, type, isSuper = false) {
        if (owner.cooldown && !isSuper) return;
        projectiles.push({
            x: owner.isPlayer ? owner.pos.x + 50 : owner.pos.x - 20,
            y: owner.isCrouching ? owner.pos.y + 60 : owner.pos.y + 30,
            vx: (owner.isPlayer ? 1 : -1) * (isSuper ? 12 : 10),
            owner, type, isSuper,
            damage: isSuper ? 50 : (type === 'hit' ? 3 : 10),
            w: isSuper ? 60 : 20, h: isSuper ? 40 : 5
        });
        if (!isSuper) {
            owner.cooldown = true;
            setTimeout(() => owner.cooldown = false, 400 / iaMemory.difficultyMultiplier);
        } else {
            owner.power = 0;
        }
    }

    window.onkeydown = (e) => {
        keys[e.code] = true;
        if (e.code === 'KeyP') togglePause();
        if (isPaused || isGameOver) return;
        if (e.code === 'Space') createProjectile(player, 'hit');
        if (e.code === 'KeyS') { createProjectile(player, 'rayo'); iaMemory.playerS_shots++; iaMemory.totalActions++; }
        if (e.code === 'Digit1' && player.power >= 100) createProjectile(player, 'ULTRA', true);
    };
    window.onkeyup = (e) => keys[e.code] = false;

    function updateIA() {
        let dist = enemy.pos.x - player.pos.x;
        // Movimiento mejorado por dificultad
        if (dist > 180) enemy.vel.x = -3 * iaMemory.difficultyMultiplier;
        else if (dist < 120) enemy.vel.x = 3 * iaMemory.difficultyMultiplier;
        else enemy.vel.x = 0;

        // Aprendizaje: Reflejos de esquive
        iaMemory.dodgeReflex = Math.min(0.9, (iaMemory.playerS_shots / iaMemory.totalActions) + (iaMemory.totalGamesPlayed * 0.05));
        
        projectiles.forEach(p => {
            if (p.owner === player && p.x > enemy.pos.x - (100 * iaMemory.difficultyMultiplier)) {
                if (Math.random() < iaMemory.dodgeReflex) {
                    enemy.isCrouching = true;
                    setTimeout(() => enemy.isCrouching = false, 300);
                }
            }
        });

        // Ataque
        if (Math.random() < 0.02 * iaMemory.difficultyMultiplier) createProjectile(enemy, 'fuego');
        if (enemy.power >= 100 && !player.isCrouching && Math.random() < 0.1) createProjectile(enemy, 'ULTRA', true);
    }

    function animate() {
        if (isPaused || isGameOver) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Suelo
        ctx.fillStyle = "#333";
        ctx.fillRect(0, 380, canvas.width, 20);

        // Jugador
        player.vel.x = 0;
        if (keys['ArrowRight']) player.vel.x = 5;
        if (keys['ArrowLeft']) player.vel.x = -5;
        player.isCrouching = keys['ArrowDown'];
        if (keys['ArrowUp'] && player.pos.y > 250) player.vel.y = -15;

        updateIA();
        player.update();
        enemy.update();
        player.draw();
        enemy.draw();

        // Proyectiles
        projectiles.forEach((p, i) => {
            p.x += p.vx;
            ctx.fillStyle = p.isSuper ? "white" : (p.owner.isPlayer ? "yellow" : "orange");
            ctx.fillRect(p.x, p.y, p.w, p.h);

            let target = p.owner === player ? enemy : player;
            let ty = target.isCrouching ? target.pos.y + 40 : target.pos.y;
            let th = target.isCrouching ? 40 : 80;

            if (p.x < target.pos.x + target.w && p.x + p.w > target.pos.x &&
                p.y < ty + th && p.y + p.h > ty) {
                target.health -= p.damage;
                projectiles.splice(i, 1);
            }
            if (p.x < 0 || p.x > canvas.width) projectiles.splice(i, 1);
        });

        // UI Update
        document.getElementById('p1-hp').style.width = Math.max(0, player.health) + "%";
        document.getElementById('p2-hp').style.width = Math.max(0, enemy.health) + "%";
        document.getElementById('p1-power').style.width = player.power + "%";
        document.getElementById('p2-power').style.width = enemy.power + "%";
        if(player.power >= 100) document.getElementById('p1-power').classList.add('ready');
        else document.getElementById('p1-power').classList.remove('ready');

        // Fin del Juego
        if (player.health <= 0 || enemy.health <= 0) {
            isGameOver = true;
            document.getElementById('overlay').style.display = 'flex';
            document.getElementById('status-text').innerText = player.health <= 0 ? "IA VICTORIOSA" : "HUMANO VICTORIOSO";
            document.getElementById('btn-main').style.display = 'none';
            document.getElementById('btn-restart').style.display = 'block';
        }

        requestAnimationFrame(animate);
    }

    animate();
</script>
</body>
</html>
